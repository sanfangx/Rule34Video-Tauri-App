name: Build iOS IPA (TrollStore)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Generate iOS Xcode Project
        run: cargo tauri ios init
        continue-on-error: true

      - name: Switch to Xcode 16
        # 强制将 GitHub Actions 的编译环境从默认的 Xcode 15 升级到 Xcode 16
        run: |
          LATEST_XCODE_16=$(ls -d /Applications/Xcode_16*.app | sort -V | tail -n 1)
          echo "Switching to $LATEST_XCODE_16"
          sudo xcode-select -s "$LATEST_XCODE_16/Contents/Developer"

      - name: Build Unsigned App
        run: |
          cd src-tauri/gen/apple
          
          # 动态获取工程名称
          PROJECT_NAME=$(ls | grep '\.xcodeproj' | sed 's/\.xcodeproj//' | head -n 1)
          echo "Starting build for $PROJECT_NAME..."
          
          # 执行免签编译，并将产物输出到当前目录的 build 文件夹
          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$PROJECT_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            SYMROOT="$(pwd)/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package into IPA
        run: |
          cd src-tauri/gen/apple/build/Release-iphoneos
          mkdir -p Payload
          mv *.app Payload/
          zip -qr ../../../../../Rule34Video.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rule34Video-Tauri-iOS-TrollStore
          path: Rule34Video.ipa
